---
name: Test Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "!backend/README.md"
      - ".github/workflows/test-backend.yaml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "!backend/README.md"
      - ".github/workflows/test-backend.yaml"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Test Code
    runs-on: ubuntu-latest
    container: python:3.9
    defaults:
      run:
        # Step into backend
        working-directory: ./backend
    # Service containers to run with `container-job`
    strategy:
      matrix:
        postgres: [13-alpine, 14-alpine]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: aof
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      keycloak:
        image: quay.io/keycloak/keycloak:15.1.0
        volumes:
          - ${{ github.workspace }}/backend/keycloak:/tmp/io
        env:
          DB_VENDOR: h2 # force keycloak to use its internal DB
          # (it autodetects the running postgres instance)
          KEYCLOAK_USER: admin
          KEYCLOAK_PASSWORD: admin
          KEYCLOAK_IMPORT: /tmp/io/dev-realm.json
          # KEYCLOAK_STATISTICS: all # enables the health endpoint under 9990
        options: >-
          --health-cmd "curl -f http://keycloak:8080/auth || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-start-period 90s
          --health-retries 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # - name: Import keycloak realm
      #   run: |
      #     docker exec keycloak kcadm.sh config credentials --server http://localhost:8080/auth --realm master --user admin --password admin
      #     docker exec keycloak kcadm.sh create realms -f /tmp/io/dev-realm.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run tests
        env:
          VERSION: test
          RELEASEID: test
          DB_URI: postgresql+asyncpg://admin:admin@postgres/aof
          AUDIENCE: alphafold-backend
          AUTH_SERVER: '["http://keycloak:8080/auth/realms/dev"]'

        run: |
          coverage run --concurrency=thread,greenlet --source=app -m pytest
          coverage xml
        # https://github.com/nedbat/coveragepy/issues/1082
        # pytest-cov doesn't seem to support the `concurrency` flag so
        # using coverage commands

      - name: Codecov
        # You may pin to the exact commit or the version.
        # uses: codecov/codecov-action@f32b3a3741e1053eb607407145bc9619351dc93b
        uses: codecov/codecov-action@v2
        with:
          # Flag upload to group coverage metrics (e.g. unittests, integration)
          flags: backend # optional
